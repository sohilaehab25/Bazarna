<app-card>
  <div class="empty-state">
    <div class="empty-state__icon">{{ icon }}</div>
    <h3 class="empty-state__title">{{ title }}</h3>
    <p class="empty-state__message">{{ message }}</p>
    @if (actionText()) {
      <app-button (onClick)="onAction.emit()">
        {{ actionText }}
      </app-button>
    }
  </div>
</app-card>
