<section class="cta-section">
  <div class="container">
    <app-card class="cta-card">
      <div class="cta-content">
        <div class="cta-text">
          <h2>Ready to Find Your Next Treasure? 💎</h2>
          <p>
            Join thousands of happy customers who have discovered their perfect
            handmade items. Start browsing our curated collection today!
          </p>
          <div class="cta-features">
            <div class="cta-feature">
              <span class="feature-icon">✨</span>
              <span>Unique Handmade Items</span>
            </div>
            <div class="cta-feature">
              <span class="feature-icon">🚚</span>
              <span>Free Shipping Over $50</span>
            </div>
            <div class="cta-feature">
              <span class="feature-icon">💝</span>
              <span>30-Day Returns</span>
            </div>
          </div>
        </div>
        <div class="cta-visual">
          <div class="cta-emoji">🛍️</div>
          <div class="cta-decoration">
            <div class="decoration-item">💕</div>
            <div class="decoration-item">✨</div>
            <div class="decoration-item">🌟</div>
          </div>
        </div>
      </div>
      <div class="cta-actions">
        <app-button routerLink="/products" class="cta-primary">
          Shop Now 🛒
        </app-button>
        <app-button variant="secondary" routerLink="/categories">
          Browse Categories 📂
        </app-button>
      </div>
    </app-card>
  </div>
</section>
