<app-card>
  <div class="cart-item">
    <div class="cart-item__header">
      <span class="cart-item__emoji">{{ item().product.emoji }}</span>
      <h3 class="cart-item__name">{{ item().product.name }}</h3>
    </div>
    <p class="cart-item__description">{{ item().product.description }}</p>
    <p class="cart-item__price">
      {{ item().product.price | currency }} x {{ item().quantity }} = {{ item().product.price * item().quantity | currency }}
    </p>
    <app-button variant="secondary" (onClick)="onRemove.emit(item().product.id)">
      Remove
    </app-button>
  </div>
</app-card>
